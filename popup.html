<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TabFlow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;color:#c9d1d9;background:#0d1117;width:360px;max-height:560px;display:flex;flex-direction:column}
header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #21262d;flex-shrink:0}
header h1{font-size:16px;color:#58a6ff}
.tab-count{font-size:12px;color:#8b949e}
.toolbar{padding:8px 16px;display:flex;gap:6px;border-bottom:1px solid #21262d;flex-shrink:0}
.toolbar .btn{flex:1;padding:6px 0;font-size:11px;font-weight:600;text-align:center;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#c9d1d9;cursor:pointer;transition:background 0.15s}
.toolbar .btn:hover{background:#30363d}
.toolbar .btn.primary{background:#238636;border-color:#238636}
.toolbar .btn.primary:hover{background:#2ea043}
.toolbar .btn.warn{color:#f85149}
.toolbar .btn.warn:hover{background:#da3633;color:#fff}
.section-header{padding:8px 16px;font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;flex-shrink:0}
#tab-list{flex:1;overflow-y:auto;padding:4px 12px}
#workspace-list{max-height:200px;overflow-y:auto;padding:4px 12px;border-bottom:1px solid #21262d}
.tab-item{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:2px;background:#161b22;border:1px solid transparent;border-radius:6px;cursor:pointer;transition:border-color 0.1s}
.tab-item:hover{border-color:#58a6ff}
.tab-item.active{border-color:#58a6ff;background:#1a2230}
.tab-item .favicon{width:16px;height:16px;flex-shrink:0}
.tab-item .tab-title{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab-item .tab-badge{font-size:10px;padding:1px 4px;border-radius:3px;flex-shrink:0}
.tab-item .tab-badge.pin{color:#daa520}
.tab-item .tab-badge.audio{color:#3fb950}
.ws-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;margin-bottom:4px;background:#161b22;border:1px solid #30363d;border-radius:6px}
.ws-info{flex:1;min-width:0}
.ws-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-meta{font-size:10px;color:#8b949e;margin-top:2px}
.ws-actions{display:flex;gap:4px;flex-shrink:0}
.ws-btn{padding:4px 8px;font-size:10px;border:1px solid #30363d;border-radius:4px;background:transparent;color:#c9d1d9;cursor:pointer}
.ws-btn:hover{background:#30363d}
.ws-btn.del{color:#f85149}
.ws-btn.del:hover{background:#da3633;color:#fff}
.empty{padding:24px 0;text-align:center;color:#484f58}
footer{padding:8px 16px;border-top:1px solid #21262d;display:flex;justify-content:space-between;flex-shrink:0}
footer a{color:#58a6ff;text-decoration:none;font-size:11px}
</style>
</head>
<body>
<header>
  <h1>📑 TabFlow</h1>
  <span class="tab-count" id="tab-count"></span>
</header>

<div class="toolbar">
  <button class="btn primary" id="btn-save">💾 保存工作区</button>
  <button class="btn" id="btn-close-dup">🧹 去重</button>
  <button class="btn warn" id="btn-switch" title="切换模式">↕</button>
</div>

<div class="section-header">💼 工作区</div>
<div id="workspace-list"></div>

<div class="section-header">📋 当前标签 (<span id="current-count">0</span>)</div>
<div id="tab-list"></div>

<footer>
  <a href="#" id="btn-settings">⚙️ 设置</a>
  <span style="font-size:11px;color:#8b949e">Ctrl+Shift+Space</span>
</footer>

<script src="popup.js"></script>
</body>
</html>
